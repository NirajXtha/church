<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-app-region: drag;
  }
  #overlay-content {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 24px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    font-size: 20px;
    line-height: 1.4;
    text-align: center;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    border-radius: 8px;
  }
  .overlay-verse-text { margin-bottom: 4px; }
  .overlay-verse-ref {
    font-size: 0.75em;
    opacity: 0.7;
    font-style: italic;
  }
  .overlay-hidden { display: none; }
  .pos-top    { align-items: flex-start; padding-top: 8px; }
  .pos-bottom { align-items: flex-end; padding-bottom: 8px; }
  .pos-center { align-items: center; }
</style>
</head>
<body>
<div id="overlay-content">
  <div id="overlay-inner" class="overlay-hidden">
    <div class="overlay-verse-text" id="overlay-text"></div>
    <div class="overlay-verse-ref" id="overlay-ref"></div>
  </div>
</div>
<script>
  const content = document.getElementById('overlay-content');
  const inner = document.getElementById('overlay-inner');
  const textEl = document.getElementById('overlay-text');
  const refEl = document.getElementById('overlay-ref');

  window.api.onOverlayUpdate((data) => {
    if (data.text) {
      textEl.textContent = data.text;
      refEl.textContent = data.reference || '';
      inner.classList.remove('overlay-hidden');
    } else {
      inner.classList.add('overlay-hidden');
    }
    if (data.position) {
      content.className = 'pos-' + data.position;
    }
    if (data.fontSize) {
      content.style.fontSize = data.fontSize + 'px';
    }
  });
</script>
</body>
</html>
