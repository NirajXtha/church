name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build:portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Read version and generate tag
        id: tag
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "tag=v$ver" >> $env:GITHUB_OUTPUT
          echo "date=$(Get-Date -Format yyyy-MM-dd)" >> $env:GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Church Presenter ${{ steps.tag.outputs.date }}
          body: Auto-built from commit ${{ github.sha }}
          files: |
            dist/Church-Presenter.exe
            dist/Setup.exe
            dist/Setup.exe.blockmap
            dist/latest.yml
          generate_release_notes: true
